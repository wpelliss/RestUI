<!DOCTYPE html>
<html lang="fr" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RestUI{% endblock %}</title>

  <!-- Tailwind CSS CDN — outil interne, pas de build step -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX — mises à jour partielles sans rechargement complet -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    /* Indicateur de chargement HTMX : atténue la table pendant le fetch */
    .htmx-request #table-body { opacity: 0.4; transition: opacity 0.15s ease; }
    /* Focus visible sur fond sombre (sidebar bg-gray-900) */
    .sidebar-link:focus-visible { outline: 2px solid white; outline-offset: 2px; border-radius: 4px; }
  </style>
</head>

<body class="h-full flex">

  <!-- Sidebar navigation -->
  <aside class="w-56 bg-gray-900 text-gray-100 flex flex-col shrink-0">
    <div class="px-4 py-5 border-b border-gray-700">
      <span class="text-lg font-semibold tracking-tight">RestUI</span>
    </div>
    <nav class="flex-1 overflow-y-auto py-4">
      <ul class="space-y-1 px-2">
        {% for ep in endpoints %}
        <li>
          <a href="/{{ ep.name }}"
             class="sidebar-link flex items-center gap-2 px-3 py-2 rounded-md text-sm
                    {% if ep.name == endpoint.name %}
                      bg-indigo-600 text-white font-medium
                    {% else %}
                      text-gray-300 hover:bg-gray-700 hover:text-white
                    {% endif %}
                    transition-colors duration-150">
            {{ ep.label }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white border-b border-gray-200 px-6 py-4">
      <h1 class="text-xl font-semibold text-gray-900">{{ endpoint.label }}</h1>
    </header>
    <div class="flex-1 overflow-auto p-6">
      {% block content %}{% endblock %}
    </div>
  </main>

</body>
</html>
